
<!DOCTYPE html>
<html lang="en">
<head>
<link rel="image" type="image/icon" href="https://i.pinimg.com/736x/9c/73/aa/9c73aa84689939c3a573f624141a871c.jpg">

<link rel="icon" href="https://i.pinimg.com/736x/fd/7f/39/fd7f396a46407462b5c9e698832005b2.jpg" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr.Vue | Register</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="form.css">
</head>
<body>

<div class="form-container">
    <h2>Join Mr.Vue</h2>

    <form>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" required>
        </div>

        <div class="input-group">
            <label>Message</label>
            <textarea rows="3" required></textarea>
        </div>

        <!-- Button as Link -->
        <a href="simple dash.html" class="btn-link">Submit</a>
    </form>
</div>

</body>
</html>
